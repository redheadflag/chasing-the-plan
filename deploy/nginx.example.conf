# Example host nginx site for Chasing the Plan (HTTP only).
# Copy to /etc/nginx/sites-available/chasing-the-plan, adjust server_name / root,
# symlink into sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx
#
# Add HTTPS later with:  sudo certbot --nginx -d your.domain
# certbot edits this block to add the TLS server and the HTTP->HTTPS redirect for you.
#
# Serves the built SPA (frontend/dist) and reverse-proxies /api to the backend
# container published on 127.0.0.1:8000 by docker-compose.prod.yml.

server {
    listen 80;
    listen [::]:80;
    server_name your.domain;

    # Where you copied the output of `npm run build`
    root /var/www/chasing-the-plan;
    index index.html;

    # Report downloads can be a few MB.
    client_max_body_size 10m;

    # SPA: serve the file if it exists, otherwise fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + report downloads -> backend container (localhost).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
